# prefix key
unbind C-b
setw -g prefix C-q
bind C-q send-prefix
set -g status-keys emacs

set -g default-terminal "tmux-256color"
set -g terminal-features ',*256color:ccolour:cstyle:undercurl:clipboard'
set -g terminal-overrides ',*256color:Tc,xterm-kitty:kitty'  # True color + Kitty keyboard


#+keymaps
bind -r ^k resizep -U 1
bind -r ^j resizep -D 1
bind -r ^h resizep -L 1
bind -r ^l resizep -R 1

bind = split-window -h -c '#{pane_current_path}' -p 45
bind - split-window -v -c '#{pane_current_path}' -p 20

bind x confirm kill-pane
bind X confirm kill-window

bind C command-prompt -p "Name of new window: " "new-window -n '%%'"
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

bind-key -N 'Toggle popup window' h if-shell -F '#{==:#{session_name},popup}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 85% -h 85% -E ~/.scripts/tmux/popup.conf
}

bind -n C-S-Left swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

bind b set-option -g status

# Sync pane toggle
bind e set-window-option synchronize-panes \; display-message "sync: #{?pane_synchronized,ON,OFF}"

# Session/window picker with fzf
# bind C-j display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --prompt='session> ' | xargs -r tmux switch-client -t"
# bind C-w display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --reverse --prompt='window> ' | cut -d: -f1-2 | xargs -r tmux switch-client -t"

# Pane join to adjacent window
bind > join-pane -t :+1
bind < join-pane -t :-1
#-keymaps

# settings
set -g base-index 1
set -g pane-base-index 1

# message text
setw -g message-style bg=yellow,fg=black
setw -g clock-mode-colour green

# pane number display
set -g pane-border-style fg=default
set -g pane-active-border-style fg=default
set -g pane-border-lines "heavy"

# popup style
set -g popup-border-lines "heavy"
set -g popup-border-style bg="#272e33"
set -g popup-style bg="#272e33"

#+statusline
#renumber windows when one is closed
set-option -g renumber-windows on

# set-option -g status-position bottom
set -g status-style bg=default
set -g status-style fg=default

set -g status-interval 1
set -g status-justify left

setw -g window-status-style fg=color102,bg=default
setw -g window-status-format " #{?window_zoomed_flag,#[underscore],}#I#[default] #{window_name} "
setw -g window-status-current-format "#[fg=red,bg=#504945,bold]#[push-default] #{?window_zoomed_flag,#[underscore],}#I#[default] #{window_name} "
setw -g window-status-last-style fg=yellow,

# setw -g window-status-format "#[bg=default,fg=colour102][#I]#W "
# setw -g window-status-current-format "#[fg=black,bg=green]#{?window_zoomed_flag,#[bg=blue],}[#I]#W "

setw -g window-status-separator " "

set -g status-left "#[bg=default,fg=blue]TMUX "
set -g status-left-length 300

set -g status-right-length 500
set -g status-right '#[fg=cyan,bright]#{?client_prefix, #[reverse] PREFIX #[noreverse] ,}'
set -ag status-right '#{?pane_synchronized, #[bg=red]SYNC#[default] ,}'
set -ag status-right '#($HOME/.scripts/tmux/status-right-prompt.sh "#{pane_current_path}") '
set -ag status-right '#[fg=yellow,bright,bg=default] %a %m/%d %H:%M'
#-statusline

# scrollback buffer
set-option -g history-limit 50000

# Recommand by neovim
set-option -g focus-events on

# Allows for faster key repetition
set -s escape-time 50
set -g repeat-time 1000

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Silence/bell monitoring — disabled: triggers on every idle/bell pane
setw -g monitor-silence 0
setw -g monitor-bell off
set -g visual-silence off
set -g visual-bell off

# auto window rename
setw -g automatic-rename



# Vi copypaste mode
setw -g mode-keys vi

unbind-key -T copy-mode-vi v

bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
# bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.
set -s set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux load-buffer -w"

# Incremental regex search in copy mode
bind -T copy-mode-vi C-r command-prompt -i -p 'search up (regex)' 'send -X search-backward-incremental "%%%"'
bind -T copy-mode-vi C-s command-prompt -i -p 'search down (regex)' 'send -X search-forward-incremental "%%%"'
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse

# status bar

set -g mouse off

# Enable Yazi's image preview to work correctly in tmux
set -g allow-passthrough off
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g extended-keys on
set -g detach-on-destroy off

#+plugins
# TPM — Tmux Plugin Manager (prefix + I to install, U to update, alt+u to remove)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Hint-based copy
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key f
set -g @fingers-hint-style 'fg=yellow,bold'
set -g @fingers-highlight-style 'fg=red,bold'
set -g @fingers-backdrop-style 'fg=colour240'

# Initialize TPM (must stay at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
#-plugins
